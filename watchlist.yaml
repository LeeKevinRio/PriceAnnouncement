# 機票監控清單
# ─────────────────────────────────────────────
# 欄位說明：
#   name              顯示在 Telegram 通知裡的名稱
#   origin            出發機場 IATA 代碼（預設 TPE）
#   destination       目的地機場 IATA 代碼
#   depart_window_days  從今天起往後掃幾天的出發日
#   stay_days         停留天數清單，每個值都會獨立掃；空陣列 [] = 任意天數
#   adults            乘客人數（預設 2）
#   cabin             艙等：ECONOMY / PREMIUM_ECONOMY / BUSINESS / FIRST
#                     （目前 Travelpayouts Data API 不支援艙等過濾，保留欄位）
#   currency          顯示幣別（預設 TWD）
#   max_price         低於此金額才觸發通知（單位 = currency；
#                     ⚠️ 是「全部乘客的總價」，不是每人，例如 adults=2 時
#                     門檻 15000 表示兩人來回總和不超過 15000）
#   airlines_allow    （可選）只接受這些航空公司，例如 [CI, BR, JX]
#   airlines_block    （可選）排除這些航空公司，例如 [LJ]
#                     兩者都用 IATA 2 字代碼；都填 = 同時通過才算
#   direct_only       （可選）true = 只接受直飛；省略或 false = 不限
# ─────────────────────────────────────────────
#
# 常用航空公司 IATA 代碼：
#   CI 中華航空    BR 長榮       JX 星宇       AE 華信
#   JL 日本航空    NH 全日空     CX 國泰       KA 港龍
#   OZ 韓亞        KE 大韓       LJ 真航空(LCC) 7C 濟州航空(LCC)
#   TR 酷航(LCC)   IT 台灣虎航(LCC)  D7 亞航X(LCC)  JQ 捷星(LCC)

defaults:
  origin: TPE
  adults: 2
  cabin: ECONOMY
  currency: TWD
  date_step_days: 3
  # 全域黑名單範例：所有航線都不要 LCC 廉航
  # airlines_block: [LJ, 7C, TR, IT, D7, JQ]

