name: Flight price scan

on:
  schedule:
    # 每 12 小時執行一次 (UTC 00:00 / 12:00 → 台北時間 08:00 / 20:00)
    - cron: "0 0,12 * * *"
  workflow_dispatch: {}  # 也允許手動從 Actions 分頁觸發

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      # Restore the notification state so we don't re-spam the same hits,
      # and the price history so 7-day trend lines have data to draw on.
      - name: Restore notification state
        id: state-cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: flight-state-${{ github.run_id }}
          restore-keys: |
            flight-state-

      - name: Restore price history
        id: history-cache
        uses: actions/cache@v4
        with:
          path: history.json
          key: flight-history-${{ github.run_id }}
          restore-keys: |
            flight-history-

      - name: Run scan
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
          TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      # actions/cache only saves on the exact-key miss above (run_id is unique),
      # so this always saves the updated state for the next run to restore.
